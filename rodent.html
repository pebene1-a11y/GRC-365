<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>rodent grid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">	
<style>
    body {
        background-color: darkslategrey;
        margin: 0;
        padding: 20px;
    }

    #page {
        width: 1024px;
        min-height: 1228px;
        background: white;
        margin: 0 auto;
        border: 1px solid dimgray;
        box-shadow: 2px 3px 6px dimgray;
        padding: 40px; 
    }

    .container {
        display: grid;
        gap: 60px 50px;
        grid-template-columns: auto auto;
        justify-content: center;
    }

    .item1 {
        grid-row: 1 / 3; 
    }

    h1 {
        font: 48pt/1.4em 'Open Sans', sans-serif;
        text-align: center;
        margin: 12px 0 0 0;
        color: darkslategrey;
        text-shadow: 2px 3px 6px darkgray;
    }

    p {
        font: 14pt/1.4em 'Open Sans', sans-serif;
        text-align: center;
    }

    img {
        width: 384px;
        height: auto; 
        display: block;
    }  .navbar {
    background-color: transparent;
    padding: 10px 0;
    margin-bottom: 20px;
    text-align: left;
}

.dropdown {
    position: relative;
    display: inline-block;
}

.dropbtn {
    background-color: #051947;
    color: white;
    padding: 12px 24px;
    font-size: 14pt;
    font-family: 'Open Sans', sans-serif;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s;
}

.dropdown-content {
    display: none;
    position: absolute;
    background-color: white;
    min-width: 240px;
    box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
    z-index: 1;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #051947;
}

.dropdown-content a {
    color: #051947;
    padding: 12px 16px;
    text-decoration: none;
    display: block;
    font-family: 'Open Sans', sans-serif;
    border-bottom: 1px solid #eee;
}

.dropdown-content a:hover {
    background-color: #092F87;
    color: white;
}

.dropdown:hover .dropdown-content {
    display: block;
}

.dropdown:hover .dropbtn {
    background-color: #092F87;
}
</style>
</head>

<body>
    <div id="page">
		<nav class="navbar">
    <div class="dropdown">
        <button class="dropbtn">Menu ▼</button>
        <div class="dropdown-content">
            <a href="simplehtmlpage.html">Basic Page</a>
            <a href="rodent.html">Grid Layout Page</a>
            <a href="portfoliopage.html">Portfolio Page</a>
            <a href="hex.html">Table page</a>
            <a href="thepillowshb.html">Responsive Design Page</a>
            <a href="sheetafallanimation.html">Animation Page</a>
        </div>
    </div>
</nav>
        <h1>Rodents</h1> 
        <p>Found on Pixabay - Scaled with AI</p>
        
        <div class="container">
            <div class="item1"><img src="chinchilla.jpg"  alt="chin"/></div>
            <div class="item2"><img src="guineapigs.jpg" alt="pigs"/></div>
            <div class="item3"><img src="chuck.jpg"  alt="wood"/></div>
        </div>
    </div>
</body>
</html>
